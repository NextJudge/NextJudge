services:
  nextjudge-data-layer:
    image: tnyuma/nextjudge-core:${NEXTJUDGE_CORE_IMAGE_TAG:-latest}
    platform: linux/amd64
    expose:
      - "5000"
    environment:
      - SERVICE_FQDN_NEXTJUDGE_DATA_LAYER_5000
      - JUDGE_PASSWORD=${JUDGE_PASSWORD}
      - JWT_SIGNING_SECRET=${JWT_SIGNING_SECRET}
      - WEB_BRIDGE_SECRET=${WEB_BRIDGE_SECRET}
      - DB_HOST=db
      - DB_PASSWORD=${DB_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - CORS_ALLOW_PREVIEW=${CORS_ALLOW_PREVIEW:-true}
      - TRUSTED_PROXY=${TRUSTED_PROXY:-true}
      - PASSWORD_RESET_DEBUG=${PASSWORD_RESET_DEBUG:-false}
      - ALLOW_INSECURE_PASSWORD_RESET=${ALLOW_INSECURE_PASSWORD_RESET:-false}
      - SEED_DATA=${SEED_DATA:-false}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - AUTH_RATE_LIMIT_PER_MIN=${AUTH_RATE_LIMIT_PER_MIN}
      - AUTH_RATE_LIMIT_BURST=${AUTH_RATE_LIMIT_BURST}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "/main", "-healthcheck", "-p", "5000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  db:
    image: postgres:16
    platform: linux/amd64
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=nextjudge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      internal:
        aliases:
          - db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    platform: linux/amd64
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    networks:
      internal:
        aliases:
          - rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nextjudge-judge:
    image: tnyuma/nextjudge-judge:${NEXTJUDGE_JUDGE_IMAGE_TAG:-latest}
    platform: linux/amd64
    privileged: true
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - NEXTJUDGE_HOST=nextjudge-data-layer
      - NEXTJUDGE_PORT=5000
      - JUDGE_PASSWORD=${JUDGE_PASSWORD}
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
    volumes:
      - go_cache:/var/lib/nextjudge/go-cache
      - go_mod_cache:/var/lib/nextjudge/go-mod
    networks:
      - internal
    depends_on:
      nextjudge-data-layer:
        condition: service_started
      rabbitmq:
        condition: service_healthy

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  go_cache:
  go_mod_cache:
