# Isolated stack for Playwright E2E only. Values match test-stack.config.sh.
services:
  db:
    image: postgres
    expose:
      - 5432
    environment:
      POSTGRES_DB: nextjudge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: e2e-postgres-password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../data-layer/nextjudge.sql:/docker-entrypoint-initdb.d/0_nextjudge.sql
      - ../../data-layer/init_prod_data.sql:/docker-entrypoint-initdb.d/1_init_prod_data.sql
    healthcheck:
      test: pg_isready -U $$POSTGRES_USER
      interval: 1s
      timeout: 1s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    expose:
      - 5672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 3s
      timeout: 2s
      retries: 10
    environment:
      RABBITMQ_DEFAULT_USER: e2e-rabbit
      RABBITMQ_DEFAULT_PASS: e2e-rabbit-password

  nextjudge-data-layer:
    build:
      context: ../../data-layer
    ports:
      - "${E2E_DATA_LAYER_PORT:-5051}:5000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: e2e-postgres-password
      DB_NAME: nextjudge
      ELASTIC_ENABLED: "false"
      JUDGE_PASSWORD: e2e-judge-password
      JWT_SIGNING_SECRET: e2e-jwt-signing-secret-minimum-32-chars
      AUTH_PROVIDER_PASSWORD: e2e-postgres-password
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: e2e-rabbit
      RABBITMQ_PASSWORD: e2e-rabbit-password
      SEED_DATA: "true"
      CORS_ORIGIN: http://127.0.0.1:8080
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/main", "-healthcheck", "-p", "5000"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  nextjudge-judge:
    image: ${E2E_JUDGE_IMAGE:-nextjudge-judge:e2e}
    pull_policy: never
    privileged: true
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      NEXTJUDGE_HOST: nextjudge-data-layer
      NEXTJUDGE_PORT: 5000
      JUDGE_PASSWORD: e2e-judge-password
      RABBITMQ_USER: e2e-rabbit
      RABBITMQ_PASSWORD: e2e-rabbit-password
    depends_on:
      rabbitmq:
        condition: service_healthy
      nextjudge-data-layer:
        condition: service_healthy
    volumes:
      - go_cache:/var/lib/nextjudge/go-cache
      - go_mod_cache:/var/lib/nextjudge/go-mod

volumes:
  postgres_data:
  go_cache:
  go_mod_cache:
