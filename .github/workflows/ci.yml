name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_NAMESPACE: tnyuma

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      docs: ${{ steps.filter.outputs.docs }}
      core: ${{ steps.filter.outputs.core }}
      judge: ${{ steps.filter.outputs.judge }}
      preview_backend: ${{ steps.filter.outputs.web == 'true' || steps.filter.outputs.core == 'true' || steps.filter.outputs.judge == 'true' }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          web:
            - 'src/web/**'
            - 'scripts/run-e2e-tests.sh'
            - 'scripts/run-e2e-playwright.sh'
            - 'scripts/prepare-e2e-judge-image.sh'
            - 'scripts/start-e2e-stack.sh'
            - 'scripts/stop-e2e-stack.sh'
            - '.github/workflows/ci.yml'
          docs:
            - 'src/docs/**'
            - '.github/workflows/ci.yml'
          core:
            - 'src/data-layer/**'
            - 'scripts/run-data-layer-tests.sh'
            - 'compose/docker-compose.coolify.yml'
            - 'scripts/coolify-*.sh'
            - 'docker-bake.hcl'
            - '.github/workflows/ci.yml'
          judge:
            - 'src/judge/**'
            - 'docker-bake.hcl'
            - '.github/workflows/ci.yml'

  web-lint:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: src/web/package-lock.json
    - name: Configure Tiptap registry
      run: |
        printf '@tiptap-pro:registry=https://registry.tiptap.dev/\n//registry.tiptap.dev/:_authToken=%s\n' \
          "${{ secrets.TIPTAP_NPM_TOKEN }}" > .npmrc
    - run: npm ci
    - run: npm run lint
    - run: npm run typecheck

  web-e2e:
    needs: [ changes, judge-ci ]
    if: |
      (needs.changes.outputs.web == 'true' || needs.changes.outputs.judge == 'true') &&
      (needs.judge-ci.result == 'success' || needs.judge-ci.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      checks: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: src/web/package-lock.json
    - uses: docker/setup-buildx-action@v3
    - name: Configure Tiptap registry
      working-directory: src/web
      run: |
        printf '@tiptap-pro:registry=https://registry.tiptap.dev/\n//registry.tiptap.dev/:_authToken=%s\n' \
          "${{ secrets.TIPTAP_NPM_TOKEN }}" > .npmrc
    - name: Install web dependencies
      working-directory: src/web
      run: npm ci
    - name: Install Playwright browser
      working-directory: src/web
      run: npx playwright install chromium --with-deps
    - name: Pull judge image for E2E
      if: needs.changes.outputs.judge == 'true'
      id: pull-judge
      env:
        E2E_JUDGE_USE_PULL: "1"
        E2E_JUDGE_PULL_IMAGE: ${{ format('{0}/nextjudge-judge:ci-{1}', env.DOCKERHUB_NAMESPACE, github.sha) }}
      run: ./scripts/prepare-e2e-judge-image.sh
    - name: Build judge image for E2E (fallback)
      if: needs.changes.outputs.judge == 'true' && steps.pull-judge.outcome == 'failure'
      uses: docker/bake-action@v6
      with:
        files: docker-bake.hcl
        targets: basejudge,judge
        push: false
        load: true
        set: |
          judge.tags=nextjudge-judge:e2e
          judge.target=release
          basejudge.cache-from=type=gha,scope=nextjudge-basejudge
          basejudge.cache-to=type=gha,mode=max,scope=nextjudge-basejudge
          judge.cache-from=type=gha,scope=nextjudge-judge
          judge.cache-to=type=gha,mode=max,scope=nextjudge-judge
    - name: Start E2E stack
      env:
        E2E_WITH_JUDGE: ${{ needs.changes.outputs.judge == 'true' && '1' || '0' }}
      run: ./scripts/start-e2e-stack.sh
    - name: Run Playwright smoke tests
      if: needs.changes.outputs.web == 'true'
      env:
        PLAYWRIGHT_JUNIT_OUTPUT: test-results/junit-smoke.xml
      run: ./scripts/run-e2e-playwright.sh --grep-invert @judge
    - name: Run Playwright judge E2E tests
      if: needs.changes.outputs.judge == 'true'
      env:
        PLAYWRIGHT_JUNIT_OUTPUT: test-results/junit-judge.xml
      run: ./scripts/run-e2e-playwright.sh --grep @judge
    - name: Upload Playwright artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-e2e-${{ github.run_id }}-${{ github.run_attempt }}
        path: |
          src/web/test-results/
          src/web/playwright-report/
        retention-days: 7
    - name: Prepare Playwright report for GitHub Pages
      id: prepare-playwright-pages
      if: always() && !cancelled() && github.event_name == 'pull_request'
      run: |
        if [ ! -d src/web/playwright-report ]; then
          echo "skipped=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        ./scripts/prepare-playwright-pages-bundle.sh
        echo "skipped=false" >> "$GITHUB_OUTPUT"
    - name: Publish Playwright report to GitHub Pages
      if: always() && !cancelled() && github.event_name == 'pull_request' && steps.prepare-playwright-pages.outputs.skipped == 'false'
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: src/web/playwright-pages-bundle
        destination_dir: playwright/pr-${{ github.event.pull_request.number }}/${{ github.run_id }}
        keep_files: true
    - name: Publish Playwright test results
      if: always() && github.event_name == 'pull_request'
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: src/web/test-results/junit*.xml
        check_name: Playwright E2E
        comment_mode: failures
    - name: Stop E2E stack
      if: always()
      run: ./scripts/stop-e2e-stack.sh

  web-build:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - name: Build web image
      uses: docker/build-push-action@v6
      with:
        context: src/web
        file: src/web/Dockerfile
        push: false
        load: true
        tags: nextjudge-web:ci
        build-args: |
          TIPTAP_NPM_TOKEN=${{ secrets.TIPTAP_NPM_TOKEN }}
        cache-from: type=gha,scope=nextjudge-web
        cache-to: type=gha,mode=max,scope=nextjudge-web

  docs-build:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - name: Build docs image
      uses: docker/build-push-action@v6
      with:
        context: src/docs
        file: src/docs/Dockerfile
        push: false
        load: true
        tags: nextjudge-docs:ci
        cache-from: type=gha,scope=nextjudge-docs
        cache-to: type=gha,mode=max,scope=nextjudge-docs

  core-build:
    needs: changes
    if: needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - name: Build core image
      uses: docker/bake-action@v6
      with:
        files: docker-bake.hcl
        targets: core
        push: false
        set: |
          core.target=release
          core.cache-from=type=gha,scope=nextjudge-core
          core.cache-to=type=gha,mode=max,scope=nextjudge-core

  judge-ci:
    needs: changes
    if: needs.changes.outputs.judge == 'true'
    runs-on: ubuntu-latest
    env:
      CI_IMAGE_TAG: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Build and push judge release image
      uses: docker/bake-action@v6
      with:
        files: docker-bake.hcl
        targets: basejudge,judge
        push: true
        set: |
          basejudge.tags=${{ env.DOCKERHUB_NAMESPACE }}/nextjudge-basejudge:ci-${{ env.CI_IMAGE_TAG }}
          judge.tags=${{ env.DOCKERHUB_NAMESPACE }}/nextjudge-judge:ci-${{ env.CI_IMAGE_TAG }}
          judge.target=release
          basejudge.cache-from=type=gha,scope=nextjudge-basejudge
          basejudge.cache-to=type=gha,mode=max,scope=nextjudge-basejudge
          judge.cache-from=type=gha,scope=nextjudge-judge
          judge.cache-to=type=gha,mode=max,scope=nextjudge-judge
    - name: Build judge test image
      uses: docker/bake-action@v6
      with:
        files: docker-bake.hcl
        targets: basejudge,judge
        push: false
        load: true
        set: |
          judge.tags=nextjudge-judge-test
          judge.target=test
          basejudge.cache-from=type=gha,scope=nextjudge-basejudge
          judge.cache-from=type=gha,scope=nextjudge-judge
    - name: Run judge integration tests
      working-directory: src/judge
      run: docker compose -f docker-compose.test.yml run --rm pytest

  backend-tests:
    needs: changes
    if: needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version-file: src/data-layer/go.mod
        cache-dependency-path: src/data-layer/go.sum
    - uses: docker/setup-buildx-action@v3
    - name: Run data layer tests
      run: ./scripts/run-data-layer-tests.sh

  ci-success:
    needs: [ changes, web-lint, web-e2e, web-build, docs-build, core-build, judge-ci, backend-tests ]
    if: always() && !cancelled() && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
    - uses: actions/checkout@v4

    - name: Update PR status comment
      if: github.event_name == 'pull_request'
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        SHA: ${{ github.event.pull_request.head.sha }}
        WEB_CHANGED: ${{ needs.changes.outputs.web }}
        DOCS_CHANGED: ${{ needs.changes.outputs.docs }}
        BACKEND_CHANGED: ${{ needs.changes.outputs.preview_backend }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        E2E_RAN: ${{ needs.web-e2e.result != 'skipped' && 'true' || 'false' }}
        E2E_RESULT: ${{ needs.web-e2e.result }}
      run: ./scripts/update-pr-status-comment.sh ci-success

  ci-failure-notify:
    needs: [ changes, web-lint, web-e2e, web-build, docs-build, core-build, judge-ci, backend-tests ]
    if: always() && !cancelled() && contains(needs.*.result, 'failure') && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
    - uses: actions/checkout@v4

    - name: Update PR status comment
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        SHA: ${{ github.event.pull_request.head.sha }}
        WEB_CHANGED: ${{ needs.changes.outputs.web }}
        DOCS_CHANGED: ${{ needs.changes.outputs.docs }}
        BACKEND_CHANGED: ${{ needs.changes.outputs.preview_backend }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        E2E_RAN: ${{ needs.web-e2e.result != 'skipped' && 'true' || 'false' }}
        E2E_RESULT: ${{ needs.web-e2e.result }}
      run: ./scripts/update-pr-status-comment.sh ci-failed

  preview-deploy:
    needs: [ changes, ci-success, web-e2e ]
    concurrency:
      group: coolify-preview-deploy
      cancel-in-progress: false
    # always() is required when ci-success ran via always() with skipped jobs
    # (e.g. docs-build). Otherwise preview-deploy is skipped even when web changed.
    if: |
      always() &&
      needs.ci-success.result == 'success' &&
      github.event_name == 'pull_request' &&
      (
        needs.changes.outputs.web == 'true' ||
        needs.changes.outputs.docs == 'true' ||
        needs.changes.outputs.preview_backend == 'true'
      ) &&
      (
        needs.web-e2e.result == 'success' ||
        needs.web-e2e.result == 'skipped'
      )
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
    - uses: actions/checkout@v4

    - name: Install SSH key for preview backend deploy
      if: ${{ needs.changes.outputs.preview_backend == 'true' && vars.COOLIFY_SSH_HOST != '' }}
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.COOLIFY_SSH_PRIVATE_KEY }}

    - name: Add VPS host key
      if: ${{ needs.changes.outputs.preview_backend == 'true' && vars.COOLIFY_SSH_HOST != '' }}
      run: |
        host="${COOLIFY_SSH_HOST#*@}"
        mkdir -p ~/.ssh
        ssh-keyscan -H "$host" >> ~/.ssh/known_hosts
      env:
        COOLIFY_SSH_HOST: ${{ vars.COOLIFY_SSH_HOST }}

    - uses: docker/setup-buildx-action@v3
      if: needs.changes.outputs.preview_backend == 'true'
    - uses: docker/login-action@v3
      if: needs.changes.outputs.preview_backend == 'true'
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Build and push core image for preview
      if: needs.changes.outputs.preview_backend == 'true'
      uses: docker/bake-action@v6
      with:
        files: docker-bake.hcl
        targets: core
        push: true
        set: |
          core.tags=${{ env.DOCKERHUB_NAMESPACE }}/nextjudge-core:ci-${{ env.PR_HEAD_SHA }}
          core.target=release
          core.cache-from=type=gha,scope=nextjudge-core
          core.cache-to=type=gha,mode=max,scope=nextjudge-core
    - name: Build and push judge image for preview
      if: needs.changes.outputs.preview_backend == 'true' && needs.changes.outputs.judge != 'true'
      uses: docker/bake-action@v6
      with:
        files: docker/bake.hcl
        targets: basejudge,judge
        push: true
        set: |
          basejudge.tags=${{ env.DOCKERHUB_NAMESPACE }}/nextjudge-basejudge:ci-${{ env.PR_HEAD_SHA }}
          judge.tags=${{ env.DOCKERHUB_NAMESPACE }}/nextjudge-judge:ci-${{ env.PR_HEAD_SHA }}
          judge.target=release
          basejudge.cache-from=type=gha,scope=nextjudge-basejudge
          basejudge.cache-to=type=gha,mode=max,scope=nextjudge-basejudge
          judge.cache-from=type=gha,scope=nextjudge-judge
          judge.cache-to=type=gha,mode=max,scope=nextjudge-judge

    - name: Deploy backend preview
      if: needs.changes.outputs.preview_backend == 'true'
      env:
        COOLIFY_API_URL: ${{ vars.COOLIFY_API_URL }}
        COOLIFY_BACKEND_SERVICE_UUID: ${{ vars.COOLIFY_BACKEND_SERVICE_UUID }}
        COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        COOLIFY_GITHUB_WEBHOOK_SECRET: ${{ secrets.COOLIFY_GITHUB_WEBHOOK_SECRET }}
        PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        PR_HTML_URL: ${{ github.event.pull_request.html_url }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        REPO_FULL_NAME: ${{ github.repository }}
        NEXTJUDGE_CORE_IMAGE_TAG: ci-${{ github.event.pull_request.head.sha }}
        NEXTJUDGE_JUDGE_IMAGE_TAG: ci-${{ github.event.pull_request.head.sha }}
        COOLIFY_RESOURCE_TYPE: service
        COOLIFY_SSH_HOST: ${{ vars.COOLIFY_SSH_HOST }}
      run: |
        COOLIFY_APP_UUID="${COOLIFY_BACKEND_SERVICE_UUID}" \
          ./scripts/coolify-preview-deploy.sh

    - name: Deploy web preview
      if: needs.changes.outputs.web == 'true'
      env:
        COOLIFY_API_URL: ${{ vars.COOLIFY_API_URL }}
        COOLIFY_WEB_APP_UUID: ${{ vars.COOLIFY_WEB_APP_UUID }}
        COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        COOLIFY_GITHUB_WEBHOOK_SECRET: ${{ secrets.COOLIFY_GITHUB_WEBHOOK_SECRET }}
        PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        PR_HTML_URL: ${{ github.event.pull_request.html_url }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        REPO_FULL_NAME: ${{ github.repository }}
      run: |
        COOLIFY_APP_UUID="${COOLIFY_WEB_APP_UUID}" \
          ./scripts/coolify-preview-deploy.sh

    - name: Deploy docs preview
      if: needs.changes.outputs.docs == 'true'
      env:
        COOLIFY_API_URL: ${{ vars.COOLIFY_API_URL }}
        COOLIFY_DOCS_APP_UUID: ${{ vars.COOLIFY_DOCS_APP_UUID }}
        COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        COOLIFY_GITHUB_WEBHOOK_SECRET: ${{ secrets.COOLIFY_GITHUB_WEBHOOK_SECRET }}
        PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        PR_HTML_URL: ${{ github.event.pull_request.html_url }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
        REPO_FULL_NAME: ${{ github.repository }}
      run: |
        COOLIFY_APP_UUID="${COOLIFY_DOCS_APP_UUID}" \
          ./scripts/coolify-preview-deploy.sh

    - name: Wait for preview URLs
      env:
        WEB_CHANGED: ${{ needs.changes.outputs.web }}
        DOCS_CHANGED: ${{ needs.changes.outputs.docs }}
        BACKEND_CHANGED: ${{ needs.changes.outputs.preview_backend }}
        PREVIEW_WAIT_TIMEOUT_SEC: "600"
        PREVIEW_POLL_INTERVAL_SEC: "30"
      run: |
        urls=""
        if [ "$BACKEND_CHANGED" = "true" ]; then
          urls="${urls} $(./scripts/preview-url.sh api)/healthy"
        fi
        if [ "$WEB_CHANGED" = "true" ]; then
          urls="${urls} $(./scripts/preview-url.sh web)"
        fi
        if [ "$DOCS_CHANGED" = "true" ]; then
          urls="${urls} $(./scripts/preview-url.sh docs)"
        fi
        PREVIEW_URLS="${urls# }" ./scripts/wait-for-preview-urls.sh

    - name: Update PR status comment
      if: success()
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        SHA: ${{ github.event.pull_request.head.sha }}
        WEB_CHANGED: ${{ needs.changes.outputs.web }}
        DOCS_CHANGED: ${{ needs.changes.outputs.docs }}
        BACKEND_CHANGED: ${{ needs.changes.outputs.preview_backend }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        E2E_RAN: ${{ needs.web-e2e.result != 'skipped' && 'true' || 'false' }}
        E2E_RESULT: ${{ needs.web-e2e.result }}
      run: ./scripts/update-pr-status-comment.sh preview-ready

    - name: Update PR status comment on failure
      if: failure()
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        SHA: ${{ github.event.pull_request.head.sha }}
        WEB_CHANGED: ${{ needs.changes.outputs.web }}
        DOCS_CHANGED: ${{ needs.changes.outputs.docs }}
        BACKEND_CHANGED: ${{ needs.changes.outputs.preview_backend }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        E2E_RAN: ${{ needs.web-e2e.result != 'skipped' && 'true' || 'false' }}
        E2E_RESULT: ${{ needs.web-e2e.result }}
      run: ./scripts/update-pr-status-comment.sh preview-failed
