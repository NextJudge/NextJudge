name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_NAMESPACE: tnyuma

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      docs: ${{ steps.filter.outputs.docs }}
      backend: ${{ steps.filter.outputs.backend }}
      judge: ${{ steps.filter.outputs.judge }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'src/web/**'
              - '.github/workflows/ci.yml'
            docs:
              - 'src/docs/**'
              - '.github/workflows/ci.yml'
            backend:
              - 'src/data-layer/**'
              - 'docker-bake.hcl'
              - '.github/workflows/ci.yml'
              - '.github/workflows/deploy-production.yml'
            judge:
              - 'src/judge/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/deploy-production.yml'

  web-lint:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/web/package-lock.json
      - name: Configure Tiptap registry
        run: |
          printf '@tiptap-pro:registry=https://registry.tiptap.dev/\n//registry.tiptap.dev/:_authToken=%s\n' \
            "${{ secrets.TIPTAP_NPM_TOKEN }}" > .npmrc
      - run: npm ci
      - run: npm run lint

  web-build:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: src/web
          file: src/web/Dockerfile
          push: false
          load: true
          tags: nextjudge-web:ci
          build-args: |
            TIPTAP_NPM_TOKEN=${{ secrets.TIPTAP_NPM_TOKEN }}
          cache-from: type=gha,scope=nextjudge-web
          cache-to: type=gha,mode=max,scope=nextjudge-web

  docs-build:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build docs image
        uses: docker/build-push-action@v6
        with:
          context: src/docs
          file: src/docs/Dockerfile
          push: false
          load: true
          tags: nextjudge-docs:ci
          cache-from: type=gha,scope=nextjudge-docs
          cache-to: type=gha,mode=max,scope=nextjudge-docs

  backend-build:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend images
        uses: docker/bake-action@v6
        with:
          files: docker-bake.hcl
          targets: basejudge,core,judge
          push: false
          set: |
            core.target=release
            judge.target=release
            basejudge.cache-from=type=gha,scope=nextjudge-basejudge
            basejudge.cache-to=type=gha,mode=max,scope=nextjudge-basejudge
            core.cache-from=type=gha,scope=nextjudge-core
            core.cache-to=type=gha,mode=max,scope=nextjudge-core
            judge.cache-from=type=gha,scope=nextjudge-judge
            judge.cache-to=type=gha,mode=max,scope=nextjudge-judge

  judge-tests:
    needs: changes
    if: needs.changes.outputs.judge == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Run judge integration tests
        working-directory: src/judge
        run: |
          docker build -f Dockerfile.newbase --target prod -t basejudge:prod .
          docker build -f Dockerfile.monolith --build-arg BASEJUDGE=basejudge:prod -t nextjudge-judge-test .
          docker compose -f docker-compose.test.yml run --rm --build pytest

  ci-success:
    needs: [changes, web-lint, web-build, docs-build, backend-build, judge-tests]
    if: always() && !cancelled() && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - run: echo "All CI checks passed"

  preview-deploy:
    needs: [changes, ci-success]
    # always() is required when ci-success ran via always() with skipped jobs
    # (e.g. docs-build). Otherwise preview-deploy is skipped even when web changed.
    if: |
      always() &&
      needs.ci-success.result == 'success' &&
      github.event_name == 'pull_request' &&
      (
        needs.changes.outputs.web == 'true' ||
        needs.changes.outputs.docs == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy web preview
        if: needs.changes.outputs.web == 'true'
        env:
          COOLIFY_API_URL: ${{ vars.COOLIFY_API_URL }}
          COOLIFY_WEB_APP_UUID: ${{ vars.COOLIFY_WEB_APP_UUID }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_GITHUB_WEBHOOK_SECRET: ${{ secrets.COOLIFY_GITHUB_WEBHOOK_SECRET }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HTML_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: |
          COOLIFY_APP_UUID="${COOLIFY_WEB_APP_UUID}" \
            ./scripts/coolify-preview-deploy.sh

      - name: Deploy docs preview
        if: needs.changes.outputs.docs == 'true'
        env:
          COOLIFY_API_URL: ${{ vars.COOLIFY_API_URL }}
          COOLIFY_DOCS_APP_UUID: ${{ vars.COOLIFY_DOCS_APP_UUID }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_GITHUB_WEBHOOK_SECRET: ${{ secrets.COOLIFY_GITHUB_WEBHOOK_SECRET }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HTML_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: |
          COOLIFY_APP_UUID="${COOLIFY_DOCS_APP_UUID}" \
            ./scripts/coolify-preview-deploy.sh

      - name: Wait for preview URLs
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          WEB_CHANGED: ${{ needs.changes.outputs.web }}
          DOCS_CHANGED: ${{ needs.changes.outputs.docs }}
          PREVIEW_WAIT_TIMEOUT_SEC: "600"
          PREVIEW_POLL_INTERVAL_SEC: "30"
        run: |
          urls=""
          if [ "$WEB_CHANGED" = "true" ]; then
            urls="${urls} https://${PR_NUMBER}-web.preview.nextjudge.net"
          fi
          if [ "$DOCS_CHANGED" = "true" ]; then
            urls="${urls} https://${PR_NUMBER}-docs.preview.nextjudge.net"
          fi
          PREVIEW_URLS="${urls# }" ./scripts/wait-for-preview-urls.sh

      - name: Update preview URLs comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          WEB_CHANGED: ${{ needs.changes.outputs.web }}
          DOCS_CHANGED: ${{ needs.changes.outputs.docs }}
          DEPLOY_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          MARKER="<!-- nextjudge-preview-deploy -->"
          body="${MARKER}
          ### Preview deployments

          "
          if [ "$WEB_CHANGED" = "true" ]; then
            body="${body}- **Web:** https://${PR_NUMBER}-web.preview.nextjudge.net
          "
          fi
          if [ "$DOCS_CHANGED" = "true" ]; then
            body="${body}- **Docs:** https://${PR_NUMBER}-docs.preview.nextjudge.net
          "
          fi
          body="${body}
          Deployed by Coolify successfully. Last deploy: \`${DEPLOY_SHA:0:7}\`"

          comment_id=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq "map(select(.body | contains(\"${MARKER}\"))) | .[0].id // empty")
          if [ -n "$comment_id" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${comment_id}" -f body="$body"
          else
            gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "$body"
          fi
