name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  DOCKERHUB_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      docs: ${{ steps.filter.outputs.docs }}
      core: ${{ steps.filter.outputs.core }}
      judge: ${{ steps.filter.outputs.judge }}
      backend: ${{ steps.filter.outputs.core == 'true' || steps.filter.outputs.judge == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'src/web/**'
            docs:
              - 'src/docs/**'
            core:
              - 'src/data-layer/**'
              - 'docker-bake.hcl'
            judge:
              - 'src/judge/**'
              - 'docker-bake.hcl'

  build-and-push-core:
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push core
        uses: docker/bake-action@v6
        with:
          files: docker-bake.hcl
          targets: core
          push: true
          set: |
            core.tags=${{ env.DOCKERHUB_NAMESPACE }}/nextjudge-core:${{ env.IMAGE_TAG }}
            core.tags=${{ env.DOCKERHUB_NAMESPACE }}/nextjudge-core:latest
            core.cache-from=type=gha,scope=nextjudge-core
            core.cache-to=type=gha,mode=max,scope=nextjudge-core
            core.target=release

  build-and-push-judge:
    needs: changes
    if: |
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.judge == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push basejudge and judge
        uses: docker/bake-action@v6
        with:
          files: docker-bake.hcl
          targets: basejudge,judge
          push: true
          set: |
            basejudge.tags=${{ env.DOCKERHUB_NAMESPACE }}/nextjudge-basejudge:${{ env.IMAGE_TAG }}
            basejudge.tags=${{ env.DOCKERHUB_NAMESPACE }}/nextjudge-basejudge:latest
            judge.tags=${{ env.DOCKERHUB_NAMESPACE }}/nextjudge-judge:${{ env.IMAGE_TAG }}
            judge.tags=${{ env.DOCKERHUB_NAMESPACE }}/nextjudge-judge:latest
            basejudge.cache-from=type=gha,scope=nextjudge-basejudge
            basejudge.cache-to=type=gha,mode=max,scope=nextjudge-basejudge
            judge.cache-from=type=gha,scope=nextjudge-judge
            judge.cache-to=type=gha,mode=max,scope=nextjudge-judge
            judge.target=release

  deploy:
    needs: [changes, build-and-push-core, build-and-push-judge]
    if: always() && !cancelled() && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy backend stack
        if: |
          github.event_name == 'workflow_dispatch' ||
          needs.changes.outputs.backend == 'true'
        env:
          COOLIFY_API_URL: ${{ vars.COOLIFY_API_URL }}
          COOLIFY_BACKEND_SERVICE_UUID: ${{ vars.COOLIFY_BACKEND_SERVICE_UUID }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          curl -sS -X GET \
            "${COOLIFY_API_URL}/deploy?uuid=${COOLIFY_BACKEND_SERVICE_UUID}&force=false" \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            -H "Accept: application/json" | jq .

      - name: Deploy web app
        if: |
          github.event_name == 'workflow_dispatch' ||
          needs.changes.outputs.web == 'true'
        env:
          COOLIFY_API_URL: ${{ vars.COOLIFY_API_URL }}
          COOLIFY_WEB_APP_UUID: ${{ vars.COOLIFY_WEB_APP_UUID }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          curl -sS -X GET \
            "${COOLIFY_API_URL}/deploy?uuid=${COOLIFY_WEB_APP_UUID}&force=false" \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            -H "Accept: application/json" | jq .

      - name: Deploy docs app
        if: |
          github.event_name == 'workflow_dispatch' ||
          needs.changes.outputs.docs == 'true'
        env:
          COOLIFY_API_URL: ${{ vars.COOLIFY_API_URL }}
          COOLIFY_DOCS_APP_UUID: ${{ vars.COOLIFY_DOCS_APP_UUID }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          curl -sS -X GET \
            "${COOLIFY_API_URL}/deploy?uuid=${COOLIFY_DOCS_APP_UUID}&force=false" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" | jq .
